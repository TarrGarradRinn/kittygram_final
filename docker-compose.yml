version: '3'
volumes:
  pg_data:
  static:
  media:
services:
  db:
    image: postgres:13
    volumes:
      - pg_data:/var/lib/postgresql/data
    env_file: .env
  backend:
    build: ./backend/
    env_file: .env
    depends_on:
      - db
    volumes:
      - static:/app/static
      - media:/app/media
  frontend:
    env_file: .env
    build: ./frontend/
    command: cp -r /app/build/. /static/
    volumes:
      - static:/static
  gateway:
    build: ./nginx/
    ports:
      - 9010:443
      - 80:80
    volumes:
      - static:/static
      - /etc/letsencrypt:/etc/letsencrypt:ro